<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的待办清单</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📝 我的待办清单</h1>
        
        <div class="input-section">
            <input type="text" id="todoInput" placeholder="输入新任务...">
            <button id="addBtn">添加</button>
        </div>
        
        <ul id="todoList"></ul>
        
        <div class="stats">
            <span>共 <span id="totalCount">0</span> 项</span>
            <span>已完成 <span id="doneCount">0</span> 项</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
